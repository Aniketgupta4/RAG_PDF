<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enterprise Access | Nexus RAG</title>
    <link rel="stylesheet" href="/styles.css" />
    
    <script>
      (function() {
        const savedTheme = localStorage.getItem('rag-app-theme');
        if (savedTheme) {
          document.documentElement.setAttribute('data-theme', savedTheme);
        } else {
          const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
        }
      })();
    </script>
  </head>
  <body class="auth-body">
    
    <button id="loginThemeToggle" class="icon-btn" style="position: absolute; top: 24px; right: 24px; z-index: 10;">
      <svg id="loginThemeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    </button>

    <div class="auth-wrapper">
      <div class="auth-card">
        
        <div class="auth-header">
          <div class="logo-mark auth-logo">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m21 16-4 4-4-4"/><path d="M17 20V4"/><path d="m3 8 4-4 4 4"/><path d="M7 4v16"/></svg>
          </div>
          <h2>RAG</h2>
          <p>A.A EnterPrice</p>
        </div>

        <form id="loginForm" class="auth-form">
          <div id="errorBox" class="auth-error" style="display: none;"></div>
          
          <div class="input-group">
            <label for="emailInput">Corporate Email</label>
            <input type="email" id="emailInput" placeholder="employee@company.com" required autocomplete="email" />
          </div>
          
          <div class="input-group">
            <label for="passwordInput">Password</label>
            <input type="password" id="passwordInput" placeholder="••••••••" required autocomplete="current-password" />
          </div>
          
          <button type="submit" id="loginBtn" class="primary-btn full-width auth-btn">
            Authenticate Securely
          </button>
        </form>

        <div class="auth-footer">
          Authorized personnel only. Contact your IT administrator for access.
        </div>

      </div>
    </div>

    <script src="/login.js"></script>
  </body>
</html>
